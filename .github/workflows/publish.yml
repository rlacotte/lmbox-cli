name: Publish to PyPI

# Triggered when a tag matching v* is pushed (e.g. v0.1.0, v0.2.0a1).
# Uses PyPI Trusted Publishing (OIDC) — no API token stored as a
# secret. The PyPI project must be pre-configured to trust this
# repository + this workflow file once (manual step, see docs).
on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write   # required by Trusted Publishing (sigstore)

jobs:
  test:
    name: pytest (guard before publish)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest

  build:
    name: Build wheel + sdist
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build backend
        run: python -m pip install --upgrade build
      - name: Build
        run: python -m build
      - name: Sanity-check that templates landed in the wheel
        # If the hatchling force-include misfires, the wheel ships
        # without templates and `lmbox agent new` would fail at
        # runtime. Fail the release loudly instead.
        run: |
          python -m pip install dist/*.whl
          python -c "import importlib.resources as r, lmbox_cli; \
            tmpl = r.files(lmbox_cli) / 'templates' / '_base' / 'manifest.yaml'; \
            assert tmpl.is_file(), 'Template missing from wheel'; \
            print('OK: templates packaged')"
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI
    # TestPyPI on every tagged release — sanity check before real PyPI.
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/lmbox-cli
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-pypi:
    name: Publish to PyPI
    # Only on non-prerelease tags (no 'a', 'b', 'rc'). Prereleases
    # stop at TestPyPI to give us a chance to smoke-test before
    # they're discoverable by partners.
    needs: build
    runs-on: ubuntu-latest
    if: |
      !contains(github.ref_name, 'a') &&
      !contains(github.ref_name, 'b') &&
      !contains(github.ref_name, 'rc')
    environment:
      name: pypi
      url: https://pypi.org/p/lmbox-cli
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
